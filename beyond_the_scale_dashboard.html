<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Beyond the Scale — Precision Red Flags Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js" crossorigin></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.12.7/Recharts.min.js" crossorigin></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js" crossorigin></script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { background: #0B0E14; color: #E8EAF0; font-family: 'DM Sans', system-ui, sans-serif; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: #0B0E14; }
  ::-webkit-scrollbar-thumb { background: #252A38; border-radius: 3px; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
// THE CRITICAL FIX: Accessing libraries via the window object
const {
  BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer,
  LineChart, Line, ReferenceLine, ComposedChart, Area, Cell, Legend, LabelList
} = window.Recharts;
const { useState } = window.React;

/* ── TOKENS ── */
const C = {
  bg:"#0B0E14", surface:"#13171F", card:"#1A1F2B", border:"#252A38",
  accent:"#E8442A", gold:"#F0A500", teal:"#1DB8A4", muted:"#4A5168",
  text:"#E8EAF0", textSub:"#8890A8", safe:"#22C55E", warn:"#F59E0B", danger:"#EF4444",
};
const FD = "'Playfair Display', Georgia, serif";
const FB = "'DM Sans', system-ui, sans-serif";
const FM = "'DM Mono', monospace";

/* ── DATA ── */
const KPI_DATA = [
  { label:"No Comorbidities",  rate:0.88, n:6254,  color:C.safe   },
  { label:"Single Comorbidity",rate:1.76, n:5457,  color:C.warn   },
  { label:"Dual: HBP + HC",   rate:3.45, n:4034,  color:C.danger },
];
const BMI_DATA = [
  { class:"Non-Diabetic", Normal:33.1, Overweight:37.8, Obese:27.6, Underweight:1.5 },
  { class:"Pre-Diabetic", Normal:12.8, Overweight:31.6, Obese:55.1, Underweight:0.6 },
  { class:"Diabetic",     Normal:15.2, Overweight:32.8, Obese:51.7, Underweight:0.3 },
];
const BMI_MEAN = [
  { group:"Neither flag", diabetic:28.02, nonDiabetic:28.01 },
  { group:"HBP only",     diabetic:28.15, nonDiabetic:27.97 },
  { group:"HC only",      diabetic:28.00, nonDiabetic:27.89 },
  { group:"Both HBP+HC",  diabetic:28.00, nonDiabetic:28.14 },
];
const LADDER_DATA = [
  { step:"No Flags",   dm:0.88, preDM:4.32,  n:6254, label:"Neither"        },
  { step:"HBP Only",  dm:1.82, preDM:17.10, n:2860, label:"Hypertension"   },
  { step:"HC Only",   dm:1.69, preDM:10.59, n:2597, label:"Hyperlipidemia" },
  { step:"Both Flags",dm:3.45, preDM:29.52, n:4034, label:"HBP + HC"       },
];
const AGE_DATA = [
  { age:"18-24", dm:0.29, preDM:0.59,  hbp:10.3, hc:7.6  },
  { age:"25-29", dm:1.43, preDM:1.84,  hbp:9.6,  hc:12.7 },
  { age:"30-34", dm:0.30, preDM:4.19,  hbp:15.4, hc:15.0 },
  { age:"35-39", dm:1.50, preDM:3.87,  hbp:21.7, hc:22.7 },
  { age:"40-44", dm:1.06, preDM:5.32,  hbp:23.9, hc:26.8 },
  { age:"45-49", dm:1.37, preDM:7.87,  hbp:28.1, hc:28.9 },
  { age:"50-54", dm:1.38, preDM:10.94, hbp:38.2, hc:40.2 },
  { age:"55-59", dm:1.62, preDM:13.61, hbp:44.3, hc:46.2 },
  { age:"60-64", dm:2.12, preDM:17.69, hbp:50.4, hc:49.1 },
  { age:"65-69", dm:2.21, preDM:20.64, hbp:54.4, hc:55.0 },
  { age:"70-74", dm:2.92, preDM:21.99, hbp:62.4, hc:55.0 },
  { age:"75-79", dm:2.55, preDM:21.91, hbp:66.1, hc:54.6 },
  { age:"80+",   dm:2.56, preDM:20.33, hbp:63.8, hc:52.9 },
];
const INCOME_DATA = [
  { income:"< $15k",    dm:2.62, hbp:57.9, hc:51.6, n:1448 },
  { income:"$15k-$25k", dm:2.64, hbp:54.0, hc:48.2, n:2346 },
  { income:"$25k-$35k", dm:2.61, hbp:51.2, hc:44.5, n:1686 },
  { income:"$35k-$50k", dm:2.10, hbp:46.0, hc:41.9, n:2146 },
  { income:"$50k+",     dm:1.24, hbp:36.2, hc:38.2, n:8119 },
];
const EDU_DATA = [
  { edu:"Elementary",    dm:4.15, n:265  },
  { edu:"< High School", dm:4.22, n:663  },
  { edu:"HS Graduate",   dm:1.90, n:3944 },
  { edu:"Some College",  dm:2.02, n:4316 },
  { edu:"College Grad",  dm:1.36, n:6544 },
];
const FEATURE_DATA = [
  { feature:"High Blood Pressure", group:"Clinical",    count:6894  },
  { feature:"High Cholesterol",    group:"Clinical",    count:6631  },
  { feature:"BMI Reading",         group:"Clinical",    count:15745 },
  { feature:"BMI Category",        group:"Clinical",    count:15745 },
  { feature:"General Health",      group:"Clinical",    count:15745 },
  { feature:"Exercise Any",        group:"Lifestyle",   count:15745 },
  { feature:"Smoking Status",      group:"Lifestyle",   count:15745 },
  { feature:"Age Group",           group:"Demographic", count:15745 },
  { feature:"Sex",                 group:"Demographic", count:15745 },
  { feature:"Education",           group:"Demographic", count:15745 },
  { feature:"Income",              group:"Demographic", count:15745 },
  { feature:"Diabetes Class",      group:"Target",      count:15745 },
];
const FEATURE_GROUP_SUMMARY = [
  { group:"Clinical",    features:5, color:"#E8442A", desc:"Blood pressure, cholesterol, BMI reading, BMI category, general health" },
  { group:"Lifestyle",   features:2, color:"#1DB8A4", desc:"Exercise frequency, smoking history"             },
  { group:"Demographic", features:4, color:"#F0A500", desc:"Age, sex, education level, income bracket"       },
  { group:"Target",      features:1, color:"#8890A8", desc:"Diabetes classification (0 / 1 / 2)"             },
];
const DM_CLASS_DATA = [
  { label:"No Diabetes",  cls:0, n:13230, pct:84.03, color:"#22C55E" },
  { label:"Confirmed DM", cls:1, n:290,   pct:1.84,  color:"#EF4444" },
  { label:"Pre-Diabetes", cls:2, n:2225,  pct:14.13, color:"#F59E0B" },
];

/* ── SHARED ── */
const SectionHeader = ({ number, title, subtitle }) => (
  <div style={{ marginBottom:32 }}>
    <div style={{ display:"flex", alignItems:"baseline", gap:16, marginBottom:8 }}>
      <span style={{ fontFamily:FM, fontSize:11, color:C.accent, letterSpacing:"0.15em", textTransform:"uppercase" }}>
        {String(number).padStart(2,"0")}
      </span>
      <div style={{ flex:1, height:1, background:C.border }} />
    </div>
    <h2 style={{ fontFamily:FD, fontSize:28, fontWeight:700, color:C.text, margin:"0 0 6px", lineHeight:1.2 }}>{title}</h2>
    <p style={{ fontFamily:FB, fontSize:14, color:C.textSub, margin:0 }}>{subtitle}</p>
  </div>
);

const InsightBox = ({ insight, action }) => (
  <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:1, marginTop:24, border:`1px solid ${C.border}`, borderRadius:8, overflow:"hidden" }}>
    <div style={{ background:C.surface, padding:"18px 22px" }}>
      <div style={{ fontFamily:FM, fontSize:10, color:C.teal, letterSpacing:"0.12em", textTransform:"uppercase", marginBottom:8 }}>Data Insight</div>
      <p style={{ fontFamily:FB, fontSize:13, color:C.textSub, margin:0, lineHeight:1.6 }}>{insight}</p>
    </div>
    <div style={{ background:C.card, padding:"18px 22px", borderLeft:`1px solid ${C.border}` }}>
      <div style={{ fontFamily:FM, fontSize:10, color:C.gold, letterSpacing:"0.12em", textTransform:"uppercase", marginBottom:8 }}>Strategic Action</div>
      <p style={{ fontFamily:FB, fontSize:13, color:C.textSub, margin:0, lineHeight:1.6 }}>{action}</p>
    </div>
  </div>
);

const Tip = ({ active, payload, label, fmt }) => {
  if (!active || !payload || !payload.length) return null;
  return (
    <div style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:6, padding:"10px 14px", fontFamily:FB }}>
      <div style={{ fontSize:12, color:C.textSub, marginBottom:6 }}>{label}</div>
      {payload.map((p,i) => (
        <div key={i} style={{ fontSize:13, color:p.color||C.text, marginBottom:2 }}>
          <span style={{ marginRight:8 }}>{p.name}:</span>
          <strong>{fmt ? fmt(p.value, p.name) : p.value}</strong>
        </div>
      ))}
    </div>
  );
};

const Btn = ({ active, color, onClick, children }) => (
  <button onClick={onClick} style={{
    fontFamily:FB, fontSize:12, padding:"7px 16px", borderRadius:5, cursor:"pointer",
    border:`1px solid ${active ? color : C.border}`,
    background: active ? color+"22" : "transparent",
    color: active ? color : C.textSub, transition:"all .2s"
  }}>{children}</button>
);

/* ── SECTION 0: Foundation ── */
const DatasetOverview = () => {
  const [fv, setFv] = useState("groups");
  const groupColor = { Clinical:C.accent, Lifestyle:C.teal, Demographic:C.gold, Target:C.muted };
  const stats = [
    { label:"Total Records",     value:"253,680", sub:"adults surveyed (full BRFSS 2015)",  color:C.teal   },
    { label:"Analytic Subset",   value:"15,745",  sub:"records in 13-column research file", color:C.accent },
    { label:"Feature Columns",   value:"13",      sub:"clinical, lifestyle & demographic",  color:C.gold   },
    { label:"Data Completeness", value:"99.9%",   sub:"near-zero missingness in subset",    color:C.safe   },
  ];
  return (
    <section id="foundation" style={{ marginBottom:80 }}>
      <SectionHeader number={0} title="The Foundation" subtitle="Scale, structure, and integrity of the CDC BRFSS 2015 dataset powering this research" />
      <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:12, marginBottom:24 }}>
        {stats.map(d => (
          <div key={d.label} style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:10, padding:"24px 20px", position:"relative", overflow:"hidden" }}>
            <div style={{ position:"absolute", top:0, left:0, right:0, height:3, background:d.color }} />
            <div style={{ fontFamily:FB, fontSize:11, color:C.textSub, marginBottom:8 }}>{d.label}</div>
            <div style={{ fontFamily:FD, fontSize:34, fontWeight:700, color:d.color, lineHeight:1 }}>{d.value}</div>
            <div style={{ fontFamily:FM, fontSize:10, color:C.muted, marginTop:6 }}>{d.sub}</div>
          </div>
        ))}
      </div>
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
        <div style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:10, padding:"24px 22px" }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20 }}>
            <div style={{ fontFamily:FB, fontSize:13, color:C.textSub }}>13-column feature set by domain</div>
            <div style={{ display:"flex", gap:6 }}>
              <Btn active={fv==="groups"}   color={C.teal} onClick={() => setFv("groups")}>By Group</Btn>
              <Btn active={fv==="features"} color={C.teal} onClick={() => setFv("features")}>All Features</Btn>
            </div>
          </div>
          {fv === "groups" ? (
            <>
              <ResponsiveContainer width="100%" height={180}>
                <BarChart data={FEATURE_GROUP_SUMMARY} barCategoryGap="30%">
                  <CartesianGrid vertical={false} stroke={C.border} />
                  <XAxis dataKey="group" tick={{ fill:C.textSub, fontSize:12, fontFamily:FB }} axisLine={false} tickLine={false} />
                  <YAxis tick={{ fill:C.muted, fontSize:11, fontFamily:FM }} axisLine={false} tickLine={false} tickFormatter={v => v+" col"} domain={[0,6]} />
                  <Tooltip content={<Tip fmt={(v) => v+" features"} />} />
                  <Bar dataKey="features" name="Feature count" radius={[5,5,0,0]}>
                    {FEATURE_GROUP_SUMMARY.map((d,i) => <Cell key={i} fill={d.color} />)}
                    <LabelList dataKey="features" position="top" style={{ fill:C.text, fontSize:13, fontFamily:FM, fontWeight:600 }} />
                  </Bar>
                </BarChart>
              </ResponsiveContainer>
            </>
          ) : (
            <div style={{ overflowY:"auto", maxHeight:300 }}>
              {FEATURE_DATA.map((d,i) => (
                <div key={d.feature} style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"7px 0", borderBottom: i < FEATURE_DATA.length-1 ? `1px solid ${C.border}` : "none" }}>
                  <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                    <div style={{ width:8, height:8, borderRadius:"50%", background:groupColor[d.group], flexShrink:0 }} />
                    <span style={{ fontFamily:FB, fontSize:13, color:C.text }}>{d.feature}</span>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
        <div style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:10, padding:"24px 22px" }}>
          <div style={{ fontFamily:FB, fontSize:13, color:C.textSub, marginBottom:20 }}>Diabetes class distribution — baseline prevalence (n = 15,745)</div>
          <ResponsiveContainer width="100%" height={100}>
            <BarChart data={[{ name:"Subset", nd:84.03, pre:14.13, dm:1.84 }]} layout="vertical" barCategoryGap="60%">
              <XAxis type="number" domain={[0,100]} hide />
              <YAxis type="category" dataKey="name" hide />
              <Tooltip content={<Tip fmt={v => v+"%"} />} />
              <Bar dataKey="nd"  name="No Diabetes"  stackId="a" fill="#22C55E" radius={[4,0,0,4]} />
              <Bar dataKey="pre" name="Pre-Diabetes" stackId="a" fill="#F59E0B" />
              <Bar dataKey="dm"  name="Confirmed DM" stackId="a" fill="#EF4444" radius={[0,4,4,0]} />
            </BarChart>
          </ResponsiveContainer>
        </div>
      </div>
    </section>
  );
};

/* ── OTHER SECTIONS SIMPLIFIED FOR EXAMPLE ── */
const ExecutiveSummary = () => (
  <section id="exec" style={{ marginBottom:80 }}>
    <SectionHeader number={1} title="The 3.9x Risk Multiplier" subtitle="CDC BRFSS 2015, n = 15,745" />
    <div style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:10, padding:"28px 24px" }}>
        <ResponsiveContainer width="100%" height={220}>
          <BarChart data={KPI_DATA} barCategoryGap="35%">
            <CartesianGrid vertical={false} stroke={C.border} />
            <XAxis dataKey="label" tick={{ fill:C.textSub, fontSize:12, fontFamily:FB }} axisLine={false} tickLine={false} />
            <YAxis tick={{ fill:C.muted, fontSize:11, fontFamily:FM }} axisLine={false} tickLine={false} tickFormatter={v => v+"%"} />
            <Tooltip content={<Tip fmt={v => v+"%"} />} />
            <Bar dataKey="rate" name="Diabetes Rate" radius={[4,4,0,0]}>
              {KPI_DATA.map((d,i) => <Cell key={i} fill={d.color} />)}
            </Bar>
          </BarChart>
        </ResponsiveContainer>
    </div>
  </section>
);

const BMIFallacy = () => (
  <section id="bmi" style={{ marginBottom:80 }}>
    <SectionHeader number={2} title="The BMI Fallacy" subtitle="Why body weight is a noisy, unreliable predictor" />
    <div style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:10, padding:"28px 24px" }}>
        <ResponsiveContainer width="100%" height={280}>
          <BarChart data={BMI_DATA} barCategoryGap="30%">
            <CartesianGrid vertical={false} stroke={C.border} />
            <XAxis dataKey="class" tick={{ fill:C.textSub, fontSize:12, fontFamily:FB }} />
            <YAxis tick={{ fill:C.muted, fontSize:11, fontFamily:FM }} />
            <Tooltip content={<Tip fmt={v => v.toFixed(1)+"%"} />} />
            <Bar dataKey="Normal" fill={C.teal} stackId="a" />
            <Bar dataKey="Obese" fill={C.danger} stackId="a" />
          </BarChart>
        </ResponsiveContainer>
    </div>
  </section>
);

const NAV = [
  { id:"foundation", label:"00 Foundation" },
  { id:"bmi",        label:"01 BMI Fallacy"  },
  { id:"exec",       label:"02 Executive"    },
];

function App() {
  const [active, setActive] = useState("foundation");
  const scrollTo = (id) => {
    setActive(id);
    document.getElementById(id).scrollIntoView({ behavior:"smooth" });
  };
  return (
    <div style={{ background:C.bg, minHeight:"100vh" }}>
      <div style={{ borderBottom:`1px solid ${C.border}`, padding:"20px 40px", display:"flex", justifyContent:"space-between", alignItems:"center", position:"sticky", top:0, zIndex:100, background:C.bg }}>
        <div style={{ fontFamily:FD, fontSize:20, fontWeight:700, color:C.text }}>Beyond the Scale</div>
        <nav style={{ display:"flex", gap:4 }}>
          {NAV.map(n => (
            <button key={n.id} onClick={() => scrollTo(n.id)} style={{
              fontFamily:FM, fontSize:10, padding:"6px 12px", borderRadius:4, border:`1px solid ${active===n.id ? C.accent : "transparent"}`,
              background: active===n.id ? C.accent+"18" : "transparent", color: active===n.id ? C.accent : C.muted, cursor:"pointer"
            }}>{n.label}</button>
          ))}
        </nav>
      </div>
      <div style={{ padding:"60px 40px", maxWidth:1000, margin:"0 auto" }}>
        <DatasetOverview />
        <BMIFallacy />
        <ExecutiveSummary />
      </div>
    </div>
  );
}

// THE FINAL RENDER FIX
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
